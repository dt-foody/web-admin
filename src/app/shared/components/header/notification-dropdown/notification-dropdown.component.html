<div class="relative">
  <button
    (click)="toggleDropdown()"
    class="relative flex items-center justify-center w-10 h-10 text-gray-500 transition-colors bg-white border border-gray-200 rounded-full hover:bg-gray-50 focus:outline-none dark:bg-gray-900 dark:border-gray-800 dark:text-gray-400"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>

    <span
      *ngIf="unreadCount$ | async as count"
      class="absolute top-0 right-0 flex items-center justify-center w-4 h-4 text-xs font-bold text-white bg-red-500 rounded-full"
    >
      {{ count > 9 ? '9+' : count }}
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 z-50 mt-2 w-80 bg-white border border-gray-100 rounded-lg shadow-xl sm:w-96 dark:bg-gray-800 dark:border-gray-700"
  >
    <div
      class="flex items-center justify-between px-4 py-3 border-b border-gray-100 dark:border-gray-700"
    >
      <div class="flex items-center gap-3">
        <h3 class="font-semibold text-gray-800 dark:text-white">Thông báo</h3>

        <label
          class="inline-flex items-center cursor-pointer select-none"
          title="Bật/Tắt âm thanh"
          (click)="$event.stopPropagation()"
        >
          <input
            type="checkbox"
            class="sr-only peer"
            [checked]="notificationService.isSoundEnabled"
            (change)="toggleSound($event)"
          />
          <div
            class="relative w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"
          ></div>

          <span class="ms-2 text-gray-400 dark:text-gray-500">
            <svg
              *ngIf="notificationService.isSoundEnabled"
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg
              *ngIf="!notificationService.isSoundEnabled"
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </span>
        </label>
      </div>

      <button
        *ngIf="(unreadCount$ | async)! > 0"
        (click)="onMarkAllRead($event)"
        class="text-xs text-blue-600 hover:underline dark:text-blue-400"
      >
        Đánh dấu đã đọc hết
      </button>
    </div>

    <div class="overflow-y-auto max-h-[400px]">
      <ng-container *ngIf="notifications$ | async as list">
        <div *ngIf="list.length > 0; else noData">
          <div
            *ngFor="let item of list"
            (click)="onMarkAsReadOnly(item)"
            [class.bg-blue-50]="!item.isRead"
            class="group flex gap-3 px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors dark:border-gray-700 dark:hover:bg-gray-700/50 relative"
            [ngClass]="{ 'dark:bg-gray-700/20': !item.isRead }"
          >
            <div class="flex-shrink-0 mt-1">
              <div
                class="flex items-center justify-center w-8 h-8 rounded-full"
                [ngClass]="
                  item.type === 'ORDER_NEW'
                    ? 'bg-blue-100 text-blue-600'
                    : 'bg-green-100 text-green-600'
                "
              >
                <svg
                  *ngIf="item.type === 'ORDER_NEW'"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                  <line x1="3" y1="6" x2="21" y2="6"></line>
                  <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <svg
                  *ngIf="item.type !== 'ORDER_NEW'"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
              </div>
            </div>

            <div class="flex-1 pr-6">
              <p class="text-sm text-gray-800 dark:text-gray-200" [class.font-bold]="!item.isRead">
                {{ item.title }}
              </p>
              <p class="text-xs text-gray-500 mt-1 line-clamp-2 dark:text-gray-400">
                {{ item.content }}
              </p>
              <p class="text-[10px] text-gray-400 mt-1">{{ formatTime(item.createdAt) }}</p>
            </div>

            <div class="flex flex-col items-end justify-between py-1">
              <div class="h-2 w-2">
                <span *ngIf="!item.isRead" class="block w-2 h-2 bg-blue-500 rounded-full"></span>
              </div>
              <button
                *ngIf="item.type === 'ORDER_NEW'"
                (click)="onNavigateToOrder($event, item)"
                class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-100 rounded-full transition-all dark:hover:bg-gray-600 dark:hover:text-blue-400"
                title="Xem chi tiết đơn hàng"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <div
            *ngIf="notificationService.hasMorePages"
            class="py-2 text-center border-t border-gray-50 dark:border-gray-700"
          >
            <button
              (click)="onLoadMore($event)"
              [disabled]="notificationService.isLoadingData"
              class="text-xs font-medium text-blue-600 hover:text-blue-700 hover:underline disabled:text-gray-400 dark:text-blue-400"
            >
              {{ notificationService.isLoadingData ? 'Đang tải...' : 'Xem thêm cũ hơn' }}
            </button>
          </div>
        </div>
      </ng-container>

      <ng-template #noData>
        <div class="py-8 text-center text-gray-400">
          <p class="text-sm">Không có thông báo mới</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>

<div
  *ngIf="isOpen"
  (click)="isOpen = false"
  class="fixed inset-0 z-40 bg-transparent cursor-default"
></div>
