<div class="relative">
  <button
    (click)="toggleDropdown()"
    class="relative flex items-center justify-center w-10 h-10 text-gray-500 transition-colors bg-white border border-gray-200 rounded-full hover:bg-gray-50 focus:outline-none dark:bg-gray-900 dark:border-gray-800 dark:text-gray-400"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>

    <span
      *ngIf="unreadCount$ | async as count"
      class="absolute top-0 right-0 flex items-center justify-center w-4 h-4 text-xs font-bold text-white bg-red-500 rounded-full"
    >
      {{ count > 9 ? '9+' : count }}
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 z-50 mt-2 w-80 bg-white border border-gray-100 rounded-lg shadow-xl sm:w-96 dark:bg-gray-800 dark:border-gray-700"
  >
    <div
      class="flex items-center justify-between px-4 py-3 border-b border-gray-100 dark:border-gray-700"
    >
      <h3 class="font-semibold text-gray-800 dark:text-white">Thông báo</h3>
      <button
        *ngIf="(unreadCount$ | async)! > 0"
        (click)="onMarkAllRead($event)"
        class="text-xs text-blue-600 hover:underline dark:text-blue-400"
      >
        Đánh dấu đã đọc hết
      </button>
    </div>

    <div class="overflow-y-auto max-h-[400px]">
      <ng-container *ngIf="notifications$ | async as list">
        <div *ngIf="list.length > 0; else noData">
          <div
            *ngFor="let item of list"
            (click)="onNotificationClick(item)"
            [class.bg-blue-50]="!item.isRead"
            class="flex gap-3 px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors dark:border-gray-700 dark:hover:bg-gray-700/50"
            [ngClass]="{ 'dark:bg-gray-700/20': !item.isRead }"
          >
            <div class="flex-shrink-0 mt-1">
              <div
                class="flex items-center justify-center w-8 h-8 rounded-full"
                [ngClass]="
                  item.type === 'ORDER_NEW'
                    ? 'bg-blue-100 text-blue-600'
                    : 'bg-green-100 text-green-600'
                "
              >
                <svg
                  *ngIf="item.type === 'ORDER_NEW'"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                  <line x1="3" y1="6" x2="21" y2="6"></line>
                  <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <svg
                  *ngIf="item.type !== 'ORDER_NEW'"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
              </div>
            </div>

            <div class="flex-1">
              <p class="text-sm text-gray-800 dark:text-gray-200" [class.font-bold]="!item.isRead">
                {{ item.title }}
              </p>
              <p class="text-xs text-gray-500 mt-1 line-clamp-2 dark:text-gray-400">
                {{ item.content }}
              </p>
              <p class="text-[10px] text-gray-400 mt-1">
                {{ formatTime(item.createdAt) }}
              </p>
            </div>

            <div *ngIf="!item.isRead" class="mt-2 flex-shrink-0">
              <span class="block w-2 h-2 bg-blue-500 rounded-full"></span>
            </div>
          </div>

          <div
            *ngIf="notificationService.hasMorePages"
            class="py-2 text-center border-t border-gray-50 dark:border-gray-700"
          >
            <button
              (click)="onLoadMore($event)"
              [disabled]="notificationService.isLoadingData"
              class="text-xs font-medium text-blue-600 hover:text-blue-700 hover:underline disabled:text-gray-400 dark:text-blue-400"
            >
              {{ notificationService.isLoadingData ? 'Đang tải...' : 'Xem thêm cũ hơn' }}
            </button>
          </div>
        </div>
      </ng-container>

      <ng-template #noData>
        <div class="py-8 text-center text-gray-400">
          <p class="text-sm">Không có thông báo mới</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>

<div
  *ngIf="isOpen"
  (click)="isOpen = false"
  class="fixed inset-0 z-40 bg-transparent cursor-default"
></div>
