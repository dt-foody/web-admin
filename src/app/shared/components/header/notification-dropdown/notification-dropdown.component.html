<div class="relative">
  <button
    (click)="toggleDropdown()"
    class="relative flex items-center justify-center w-10 h-10 text-gray-500 transition-colors bg-white border border-gray-200 rounded-full hover:bg-gray-50 focus:outline-none"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>

    <span
      *ngIf="unreadCount > 0"
      class="absolute top-0 right-0 flex items-center justify-center w-4 h-4 text-xs font-bold text-white bg-red-500 rounded-full"
    >
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 z-50 mt-2 w-80 bg-white border border-gray-100 rounded-lg shadow-xl sm:w-96"
  >
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <h3 class="font-semibold text-gray-800">Thông báo</h3>
      <button (click)="markAllRead()" class="text-xs text-blue-600 hover:underline">
        Đánh dấu tất cả đã đọc
      </button>
    </div>

    <div class="overflow-y-auto max-h-80">
      <ng-container *ngIf="notifications.length > 0; else noData">
        <div
          *ngFor="let item of notifications"
          (click)="markAsRead(item)"
          [class.bg-blue-50]="!item.isRead"
          class="flex gap-3 px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <div class="flex-shrink-0 mt-1">
            <div
              class="flex items-center justify-center w-8 h-8 bg-green-100 text-green-600 rounded-full"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </div>
          </div>

          <div class="flex-1">
            <p class="text-sm font-medium text-gray-800" [class.font-bold]="!item.isRead">
              {{ item.title }}
            </p>
            <p class="text-xs text-gray-500 mt-1 line-clamp-2">
              {{ item.content }}
            </p>
            <p class="text-[10px] text-gray-400 mt-1">
              {{ formatTime(item.createdAt) }}
            </p>
          </div>

          <div *ngIf="!item.isRead" class="mt-2">
            <span class="block w-2 h-2 bg-blue-500 rounded-full"></span>
          </div>
        </div>
      </ng-container>

      <ng-template #noData>
        <div class="py-8 text-center text-gray-400">
          <p class="text-sm">Không có thông báo mới</p>
        </div>
      </ng-template>
    </div>

    <div class="border-t border-gray-100">
      <a
        routerLink="/notifications"
        class="block w-full px-4 py-2 text-sm text-center text-gray-600 hover:bg-gray-50 hover:text-blue-600"
      >
        Xem tất cả thông báo
      </a>
    </div>
  </div>
</div>

<div
  *ngIf="isOpen"
  (click)="isOpen = false"
  class="fixed inset-0 z-40 bg-transparent cursor-default"
></div>
